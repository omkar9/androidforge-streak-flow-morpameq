name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Force overwrite libs.versions.toml
        run: |
          mkdir -p gradle
          printf '%s\n' '[versions]' 'agp = "8.3.2"' 'kotlin = "1.9.23"' 'coreKtx = "1.13.1"' 'junit = "4.13.2"' 'junitVersion = "1.2.1"' 'espressoCore = "3.6.1"' 'lifecycleRuntimeKtx = "2.8.4"' 'activityCompose = "1.9.1"' 'composeBom = "2024.08.00"' 'hilt = "2.51.1"' 'hiltNavigationCompose = "1.2.0"' 'room = "2.6.1"' 'navigationCompose = "2.7.7"' 'coroutines = "1.8.1"' 'datastorePreferences = "1.1.1"' 'workManager = "2.9.1"' 'playServicesAds = "23.3.0"' 'material3 = "1.2.1"' '' '[libraries]' 'androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }' 'junit = { group = "junit", name = "junit", version.ref = "junit" }' 'androidx-junit = { group = "androidx.test.ext", name = "junit", version.ref = "junitVersion" }' 'androidx-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "espressoCore" }' 'androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }' 'androidx-lifecycle-viewmodel-compose = { group = "androidx.lifecycle", name = "lifecycle-viewmodel-compose", version.ref = "lifecycleRuntimeKtx" }' 'androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version.ref = "activityCompose" }' 'androidx-compose-bom = { group = "androidx.compose", name = "compose-bom", version.ref = "composeBom" }' 'androidx-ui = { group = "androidx.compose.ui", name = "ui" }' 'androidx-ui-graphics = { group = "androidx.compose.ui", name = "ui-graphics" }' 'androidx-ui-tooling = { group = "androidx.compose.ui", name = "ui-tooling" }' 'androidx-ui-tooling-preview = { group = "androidx.compose.ui", name = "ui-tooling-preview" }' 'androidx-ui-test-manifest = { group = "androidx.compose.ui", name = "ui-test-manifest" }' 'androidx-ui-test-junit4 = { group = "androidx.compose.ui", name = "ui-test-junit4" }' 'androidx-material3 = { group = "androidx.compose.material3", name = "material3", version.ref = "material3" }' 'androidx-navigation-compose = { group = "androidx.navigation", name = "navigation-compose", version.ref = "navigationCompose" }' 'hilt-android = { group = "com.google.dagger", name = "hilt-android", version.ref = "hilt" }' 'hilt-android-compiler = { group = "com.google.dagger", name = "hilt-android-compiler", version.ref = "hilt" }' 'androidx-hilt-navigation-compose = { group = "androidx.hilt", name = "hilt-navigation-compose", version.ref = "hiltNavigationCompose" }' 'androidx-room-runtime = { group = "androidx.room", name = "room-runtime", version.ref = "room" }' 'androidx-room-ktx = { group = "androidx.room", name = "room-ktx", version.ref = "room" }' 'androidx-room-compiler = { group = "androidx.room", name = "room-compiler", version.ref = "room" }' 'kotlinx-coroutines-android = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-android", version.ref = "coroutines" }' 'androidx-datastore-preferences = { group = "androidx.datastore", name = "datastore-preferences", version.ref = "datastorePreferences" }' 'androidx-work-runtime-ktx = { group = "androidx.work", name = "work-runtime-ktx", version.ref = "workManager" }' 'play-services-ads = { group = "com.google.android.gms", name = "play-services-ads", version.ref = "playServicesAds" }' '' '[plugins]' 'android-application = { id = "com.android.application", version.ref = "agp" }' 'android-library = { id = "com.android.library", version.ref = "agp" }' 'kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }' 'kotlin-kapt = { id = "org.jetbrains.kotlin.kapt", version.ref = "kotlin" }' 'dagger-hilt-android = { id = "com.google.dagger.hilt.android", version.ref = "hilt" }' > gradle/libs.versions.toml
          echo "libs.versions.toml OK"

      - name: Validate and fix AndroidManifest.xml
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET, os
          manifest = 'app/src/main/AndroidManifest.xml'
          os.makedirs('app/src/main', exist_ok=True)
          try:
              ET.parse(manifest)
              print('Manifest valid')
          except Exception as e:
              print('Manifest broken:', e, 'â€” writing fallback')
              with open(manifest, 'w') as f:
                  f.write('<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">\n    <uses-permission android:name=\"android.permission.INTERNET\" />\n    <application android:name=\".MyApplication\" android:allowBackup=\"true\" android:icon=\"@mipmap/ic_launcher\" android:label=\"@string/app_name\" android:roundIcon=\"@mipmap/ic_launcher_round\" android:supportsRtl=\"true\" android:theme=\"@style/Theme.App\">\n        <activity android:name=\".MainActivity\" android:exported=\"true\">\n            <intent-filter><action android:name=\"android.intent.action.MAIN\" /><category android:name=\"android.intent.category.LAUNCHER\" /></intent-filter>\n        </activity>\n    </application>\n</manifest>\n')
              print('Fallback manifest written')
          "

      - name: Generate launcher icons (all densities)
        run: |
          pip install Pillow --quiet
          python3 -c "
          from PIL import Image, ImageDraw
          import os

          densities = {
              'mipmap-mdpi':    48,
              'mipmap-hdpi':    72,
              'mipmap-xhdpi':   96,
              'mipmap-xxhdpi':  144,
              'mipmap-xxxhdpi': 192,
          }

          for folder, size in densities.items():
              path = os.path.join('app/src/main/res', folder)
              os.makedirs(path, exist_ok=True)

              # Square icon (ic_launcher.png)
              img = Image.new('RGBA', (size, size), (98, 0, 238, 255))
              draw = ImageDraw.Draw(img)
              margin = size // 6
              draw.ellipse([margin, margin, size-margin, size-margin], fill=(255,255,255,220))
              img.save(os.path.join(path, 'ic_launcher.png'))

              # Round icon (ic_launcher_round.png)
              img2 = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw2 = ImageDraw.Draw(img2)
              draw2.ellipse([0, 0, size-1, size-1], fill=(98, 0, 238, 255))
              margin2 = size // 6
              draw2.ellipse([margin2, margin2, size-margin2, size-margin2], fill=(255,255,255,220))
              img2.save(os.path.join(path, 'ic_launcher_round.png'))

          print('Icons generated for all densities')
          "

      - name: Create fallback resource files if missing
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          if [ ! -f app/src/main/res/values/strings.xml ]; then
            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<resources>' '    <string name="app_name">App</string>' '</resources>' > app/src/main/res/values/strings.xml
          fi
          if [ ! -f app/src/main/res/values/themes.xml ]; then
            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<resources>' '    <style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" />' '    <style name="Theme.StreakFlow" parent="Theme.MaterialComponents.DayNight.NoActionBar" />' '    <style name="Theme.App.Starting" parent="Theme.StreakFlow" />' '</resources>' > app/src/main/res/values/themes.xml
          fi
          if [ ! -f app/src/main/res/xml/data_extraction_rules.xml ]; then
            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<data-extraction-rules>' '    <cloud-backup>' '        <exclude domain="sharedpref" path="." />' '    </cloud-backup>' '</data-extraction-rules>' > app/src/main/res/xml/data_extraction_rules.xml
          fi
          if [ ! -f app/src/main/res/xml/backup_rules.xml ]; then
            printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' '<full-backup-content>' '    <exclude domain="sharedpref" path="." />' '</full-backup-content>' > app/src/main/res/xml/backup_rules.xml
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            build/reports/
          retention-days: 7
