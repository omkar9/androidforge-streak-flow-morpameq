name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi
          chmod +x gradlew

      - name: Generate launcher icons (all densities)
        run: |
          pip install Pillow --quiet
          python3 -c "
          from PIL import Image, ImageDraw
          import os
          densities = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          for folder, size in densities.items():
              path = os.path.join('app/src/main/res', folder)
              os.makedirs(path, exist_ok=True)
              img = Image.new('RGBA', (size, size), (98, 0, 238, 255))
              draw = ImageDraw.Draw(img)
              m = size // 6
              draw.ellipse([m, m, size-m, size-m], fill=(255,255,255,220))
              img.save(os.path.join(path, 'ic_launcher.png'))
              img2 = Image.new('RGBA', (size, size), (0,0,0,0))
              draw2 = ImageDraw.Draw(img2)
              draw2.ellipse([0,0,size-1,size-1], fill=(98,0,238,255))
              draw2.ellipse([m,m,size-m,size-m], fill=(255,255,255,220))
              img2.save(os.path.join(path, 'ic_launcher_round.png'))
          print('Icons generated')
          "

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            build/reports/
          retention-days: 7
